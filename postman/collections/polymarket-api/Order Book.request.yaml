$kind: http-request
name: Order Book
method: GET
url: '{{clobBaseUrl}}/book'
order: 4000
queryParams:
  - key: token_id
    value: '{{tokenId}}'
    description: Token ID for the market to get order book
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Response has order book structure", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an('object');
          pm.expect(jsonData).to.have.property('bids');
          pm.expect(jsonData).to.have.property('asks');
          pm.expect(jsonData.bids).to.be.an('array');
          pm.expect(jsonData.asks).to.be.an('array');
      });
